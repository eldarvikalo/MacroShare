services:
  postgres:
    image: postgres:16-alpine
    container_name: macroshare-postgres
    environment:
      POSTGRES_DB: macroshare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - macroshare_pgdata:/var/lib/postgresql/data

volumes:
  macroshare_pgdata:
